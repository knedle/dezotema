site_name: DezoTema
site_description: Tematická wiki tvrzení a postojů z přepisů videí a rozhovorů

theme:
  name: material
  language: cs
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight

docs_dir: wiki

extra_javascript:
  - js/zdroje-filter.js

extra_css:
  - css/zdroje-filter.css
  - css/nav.css

markdown_extensions:
  - attr_list
  - toc:
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

nav:
  - Úvod: index.md
  - Témata:
    - Benešovy dekrety a sudetský sjezd: benesovy-dekrety.md
    - Blízký východ: blizky-vychod.md
    - Ceny energií: ceny-energie.md
    - COVID a vakcíny: covid-vakciny.md
    - Digitální kontrola: digitalni-kontrola.md
    - DSA a cenzura: dsa-cenzura.md
    - FARA a neziskovky: fara-neziskovky.md
    - Jaderné zbraně a jaderná hrozba: jaderne-zbrane.md
    - Kauzy a korupce: kauzy.md
    - Konspirační teorie: konspirace.md
    - Média a propaganda: media-propaganda.md
    - Migrace a islamizace: migrace.md
    - Politický systém: politicky-system.md
    - Rodina a děti: rodina-deti.md
    - Suverenita a EU: suverenita-eu.md
    - Válka, NATO a Rusko: valka-nato-rusko.md
    - Větrné elektrárny: vetrniky.md
    - Predikce: predikce.md
    - Stochastický teror: stochasticky-teror.md
  - Osoby:
    - Jindřich Rajchl: osoby/rajchl.md
    - Lenka Tarabová: osoby/tarabova.md
    - Konspirátor Boldy: osoby/boldy.md
    - Pavel Zítko: osoby/zitko.md
    - Jiří Černohorský: osoby/cernohorsky.md
    - Soňa Peková: osoby/pekova.md
    - Ladislav Vrabel: osoby/vrabel.md
    - Pynelopi Cimprichová: osoby/cimprichova.md
  - Zdroje: _zdroje.md
  - O stránce: o-strance.md
